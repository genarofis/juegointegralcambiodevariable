<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reto de Integrales</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 850px; }
        
        .stats { display: flex; gap: 30px; margin-bottom: 20px; font-size: 1.3rem; font-weight: bold; }
        #nivel-val { color: #e67e22; }
        #puntos-val { color: #2980b9; }

        .integral-area { 
            font-size: 3.5rem; 
            margin: 30px 0; 
            padding: 40px;
            background: #fff;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            min-height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controles { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 25px; }
        .btn-opcion { 
            padding: 15px 25px; 
            background: white; 
            border: 2px solid #2980b9; 
            color: #2980b9;
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.4rem;
            transition: all 0.2s;
        }
        .btn-opcion:hover { background: #2980b9; color: white; transform: translateY(-2px); }
        
        .btn-clear { background: #95a5a6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .btn-check { background: #27ae60; color: white; border: none; padding: 18px 50px; border-radius: 40px; font-size: 1.3rem; cursor: pointer; margin-top: 30px; font-weight: bold; transition: 0.3s; }
        .btn-check:hover { background: #2ecc71; box-shadow: 0 5px 15px rgba(46,204,113,0.4); }
        
        .feedback { margin-top: 25px; font-weight: bold; font-size: 1.2rem; min-height: 35px; }
    </style>
</head>
<body>

    <div class="stats">
        <div>Puntos: <span id="puntos-val">0</span></div>
        <div>Dificultad: <span id="nivel-val">Básica</span></div>
    </div>

    <div class="card">
        <div class="integral-area" id="math-box"></div>

        <div class="controles" id="botones-opciones"></div>
        
        <button class="btn-clear" onclick="limpiar()">Borrar campos</button>
        <br>
        <button class="btn-check" onclick="validar()">Comprobar</button>
        
        <div id="feedback" class="feedback"></div>
    </div>

    <script>
        let score = 0;
        let nivel = 1;
        let actual = {};
        let elegidos = [];

        const EJERCICIOS = {
            n1: [ // Nivel Básico (Positivas y Trig Básicas)
                { t: (r) => `\\int \\left(${r[0] || '?'}\\right)^{4} \\cdot ${r[1] || '?'} \\, dx`, u: 'x^3', du: '3x^2', ops: ['x^3', '3x^2', 'x^2', '3'] },
                { t: (r) => `\\int \\cos(${r[0] || '?'}) \\cdot ${r[1] || '?'} \\, dx`, u: '5x', du: '5', ops: ['5x', '5', 'x', 'x^5'] },
                { t: (r) => `\\int e^{${r[0] || '?'}} \\cdot ${r[1] || '?'} \\, dx`, u: '2x', du: '2', ops: ['2x', '2', 'x', 'e^x'] }
            ],
            n2: [ // Nivel Avanzado (Log, Negativas, Fraccionarias)
                { t: (r) => `\\int (${r[0] || '?'}) \\cdot ${r[1] || '?'} \\, dx`, u: '\\ln(x)', du: '\\frac{1}{x}', ops: ['\\ln(x)', '\\frac{1}{x}', 'x', 'e^x'] },
                { t: (r) => `\\int (${r[0] || '?'})^{-3} \\cdot ${r[1] || '?'} \\, dx`, u: 'x^2', du: '2x', ops: ['x^2', '2x', 'x^3', '2'] },
                { t: (r) => `\\int \\sqrt{${r[0] || '?'}} \\cdot ${r[1] || '?'} \\, dx`, u: 'x^3+1', du: '3x^2', ops: ['x^3+1', '3x^2', 'x^2', '3'] },
                { t: (r) => `\\int (${r[0] || '?'})^{1/2} \\cdot ${r[1] || '?'} \\, dx`, u: '\\sin(x)', du: '\\cos(x)', ops: ['\\sin(x)', '\\cos(x)', '1', 'x'] },
                { t: (r) => `\\int \\sec^2(${r[0] || '?'}) \\cdot ${r[1] || '?'} \\, dx`, u: 'x^4', du: '4x^3', ops: ['x^4', '4x^3', 'x', '4'] }
            ]
        };

        function cargar() {
            nivel = (score >= 10) ? 2 : 1;
            document.getElementById('nivel-val').innerText = (nivel === 1) ? "Básica" : "Avanzada";
            
            const pool = (nivel === 1) ? EJERCICIOS.n1 : EJERCICIOS.n2;
            actual = pool[Math.floor(Math.random() * pool.length)];
            elegidos = [];
            
            refrescarMath();
            
            const mezcladas = [...actual.ops].sort(() => Math.random() - 0.5);
            document.getElementById('botones-opciones').innerHTML = mezcladas.map(o => 
                `<button class="btn-opcion" onclick="pulsar('${o}')">\\(${o}\\)</button>`
            ).join('');
            
            MathJax.typesetPromise();
        }

        function pulsar(v) {
            if (elegidos.length < 2) {
                elegidos.push(v);
                refrescarMath();
            }
        }

        function limpiar() {
            elegidos = [];
            refrescarMath();
        }

        function refrescarMath() {
            const box = document.getElementById('math-box');
            box.innerHTML = `\\[ ${actual.t(elegidos)} \\]`;
            MathJax.typesetPromise([box]);
        }

        function validar() {
            const fb = document.getElementById('feedback');
            if (elegidos.length < 2) {
                fb.innerHTML = "<span style='color:#e67e22'>Selecciona dos piezas.</span>";
                return;
            }

            // Validamos: primero la función (u) y luego el diferencial (du)
            if (elegidos[0] === actual.u && elegidos[1] === actual.du) {
                fb.innerHTML = "<span style='color:#27ae60'>¡Excelente! f(u) du identificado.</span>";
                score++;
                document.getElementById('puntos-val').innerText = score;
                setTimeout(() => { fb.innerText = ""; cargar(); }, 1500);
            } else {
                fb.innerHTML = "<span style='color:#c0392b'>Incorrecto. El orden es: f(u) y luego du.</span>";
            }
        }

        window.onload = cargar;
    </script>
</body>
</html>
