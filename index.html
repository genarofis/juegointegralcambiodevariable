
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Juego Cambio de Variable</title>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

h1{text-align:center}

.ejercicio{
background:white;
padding:20px;
border-radius:10px;
margin:20px 0;
}

.dropzone{
width:180px;
height:50px;
border:2px dashed gray;
display:inline-block;
text-align:center;
line-height:50px;
margin:10px;
background:#fafafa;
}

.opcion{
display:inline-block;
padding:8px 15px;
margin:6px;
background:#ddd;
border-radius:6px;
cursor:grab;
}

.correcto{color:green;font-weight:bold}
.incorrecto{color:red;font-weight:bold}

</style>

</head>

<body>

<h1>Juego de Cambio de Variable</h1>

<p>Puntuación: <span id="score">0</span></p>

<div id="ejercicio"></div>

<button onclick="verificar()">Verificar</button>

<p id="resultado"></p>

<script>

let puntuacion=0

let ejercicioActual=null

function aleatorio(min,max){

return Math.floor(Math.random()*(max-min+1))+min

}

function generarPolinomio(){

let n=aleatorio(2,5)

return {
g:`x^{${n}}`,
dg:`${n}x^{${n-1}}`
}

}

function generarLineal(){

let a=aleatorio(2,6)

return{
g:`${a}x`,
dg:`${a}`
}

}

function generarTrig(){

let a=aleatorio(2,5)

return{
g:`${a}x`,
dg:`${a}`,
forma:"trig"
}

}

function generarEjercicio(){

let tipo=aleatorio(1,3)

let base

if(tipo==1) base=generarPolinomio()
if(tipo==2) base=generarLineal()
if(tipo==3) base=generarTrig()

let integral=""

if(tipo==1){

let p=aleatorio(2,5)

integral=`\\( \\int (${base.g})^{${p}} ${base.dg} \\, dx \\)`

}

if(tipo==2){

integral=`\\( \\int e^{${base.g}} ${base.dg} \\, dx \\)`

}

if(tipo==3){

integral=`\\( \\int \\sin(${base.g}) ${base.dg} \\, dx \\)`

}

let distractores=[

"x^2","2x","3x^2","x^3","4","5x"

]

let opciones=[

{id:"u",texto:base.g},
{id:"du",texto:base.dg}

]

let distractores=[

{id:"d1",texto:"x^2"},
{id:"d2",texto:"2x"},
{id:"d3",texto:"3x^2"},
{id:"d4",texto:"x^3"},
{id:"d5",texto:"4"}

]

while(opciones.length<6){

let d=distractores[aleatorio(0,distractores.length-1)]

if(!opciones.some(o=>o.texto==d.texto)) opciones.push(d)

}

opciones.sort(()=>Math.random()-0.5)
while(opciones.length<6){

let d=distractores[aleatorio(0,distractores.length-1)]

if(!opciones.includes(d)) opciones.push(d)

}

opciones.sort(()=>Math.random()-0.5)

ejercicioActual={

u:base.g,
du:base.dg,
integral:integral,
opciones:opciones

}

dibujar()

}

function dibujar(){

let html=""

html+=`<div class="ejercicio">`

html+=`<p>${ejercicioActual.integral}</p>`

html+=`u:
<div class="dropzone" id="u" ondrop="drop(event)" ondragover="allowDrop(event)">?</div>`

html+=`du:
<div class="dropzone" id="du" ondrop="drop(event)" ondragover="allowDrop(event)">?</div>`

html+=`<div>`

ejercicioActual.opciones.forEach(o=>{

html+=`<div class="opcion" draggable="true" ondragstart="drag(event)" id="${o}">${o}</div>`

})

html+=`</div></div>`

document.getElementById("ejercicio").innerHTML=html

MathJax.typeset()

}

function allowDrop(ev){

ev.preventDefault()

}

function drag(ev){

ev.dataTransfer.setData("text",ev.target.id)

}

function drop(ev){

ev.preventDefault()

let data=ev.dataTransfer.getData("text")

ev.target.innerHTML=data

ev.target.setAttribute("data-value",data)

}

function verificar(){

let u=document.getElementById("u").dataset.value

let du=document.getElementById("du").dataset.value

if(u==ejercicioActual.u && du==ejercicioActual.du){

document.getElementById("resultado").innerHTML="<span class='correcto'>Muy bien</span>"

puntuacion++

document.getElementById("score").innerText=puntuacion

generarEjercicio()

}else{

document.getElementById("resultado").innerHTML="<span class='incorrecto'>Intenta otra vez</span>"

}

}

generarEjercicio()

</script>

</body>

</html>
```
