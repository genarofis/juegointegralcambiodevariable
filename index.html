
<!DOCTYPE html>
<html lang="es">

<head>

<script>
window.MathJax = {

}

</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>

body{
font-family:Arial;
max-width:900px;

padding:20px;
background:#f0f2f5;
}

h1{
text-align:center;
color:#1a73e8;
}

.integral{
font-size:2em;
text-align:center;
margin:30px 0;
}

.dropzone{
display:inline-block;
min-width:110px;
height:50px;
border:3px dashed #1a73e8;

}

.opcion{
padding:12px 20px;

}

.opcion:hover{
background:#1a73e8;
color:white;
}

.correcto{color:green;font-size:1.3em}
.incorrecto{color:red;font-size:1.3em}

.score{

}

button{
display:block;
margin:auto;

color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

#resultado{
text-align:center;
margin-top:20px;
font-size:1.3em;
}

</style>

</head>

<body>

<h1>Juego de Cambio de Variable</h1>

<div class="score">
Puntuación: <span id="score">0</span>
</div>

<div id="ejercicio"></div>

<button onclick="verificar()">Verificar</button>

<div id="resultado"></div>

<script>

let puntuacion=0
let ejercicioActual=null

function aleatorio(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function generarEjercicio(){

let tipo=aleatorio(1,5)

let u,du
let estructura=[]

switch(tipo){

case 1:

let n=aleatorio(2,4)
let p=aleatorio(2,3)

u=`x^{${n}}`
du=`${n}x^{${n-1}}`

estructura=[
"\\int (",
"drop1",
`)^{${p}} \\cdot `,
"drop2",
" dx"
]

break

case 2:

let a=aleatorio(2,4)

u=`${a}x`
du=`${a}`

estructura=[
"\\int ",
"drop1",
" \\cdot e^{",
"drop2",
"} dx"
]

break

case 3:

let b=aleatorio(2,4)

u=`${b}x`
du=`${b}`

estructura=[
"\\int ",
"drop1",
" \\cdot \\sin(",
"drop2",
") dx"
]

break

case 4:

let c=aleatorio(2,4)

u=`${c}x`
du=`${c}`

estructura=[
"\\int ",
"drop1",
" \\cdot \\cos(",
"drop2",
") dx"
]

break

case 5:

u="\\ln x"
du="\\frac{1}{x}"

estructura=[
"\\int \\frac{",
"drop1",
"}{",
"drop2",
"} dx"
]

break

}

let distractores=[
"x^2","2x","x^3","3x^2","5","5x",
"\\sin x","\\cos x","e^x"
]

distractores=distractores.filter(d=>d!=u && d!=du)

let d1=distractores[aleatorio(0,distractores.length-1)]
let d2=distractores[aleatorio(0,distractores.length-1)]

let opciones=[u,du,d1,d2]

opciones.sort(()=>Math.random()-0.5)

ejercicioActual={u,du,estructura,opciones,respuestas:{}}

dibujar()

}

function dibujar(){

let html="<div class='integral'>"

ejercicioActual.estructura.forEach(parte=>{

if(parte=="drop1" || parte=="drop2"){

html+=`<span class="dropzone" id="${parte}" ondrop="drop(event)" ondragover="allowDrop(event)"></span>`

}else{

html+=`\\(${parte}\\)`

}

})

html+="</div>"

html+="<div class='opciones'>"

ejercicioActual.opciones.forEach(op=>{

html+=`
<div class="opcion"
draggable="true"
ondragstart="drag(event)"
data-value="${op}">
\\(${op}\\)
</div>
`

})

html+="</div>"

document.getElementById("ejercicio").innerHTML=html

MathJax.typesetPromise()

}

function drag(ev){

ev.dataTransfer.setData("text",ev.target.dataset.value)

}

function allowDrop(ev){
ev.preventDefault()
}

function drop(ev){

ev.preventDefault()

let data=ev.dataTransfer.getData("text")

ev.target.innerHTML="\\("+data+"\\)"

ev.target.dataset.value=data

MathJax.typesetPromise([ev.target])

}

function verificar(){

let r1=document.getElementById("drop1").dataset.value
let r2=document.getElementById("drop2").dataset.value

if(!r1 || !r2){

document.getElementById("resultado").innerHTML="<span class='incorrecto'>Debes llenar ambos espacios</span>"
return

}

let correcto=(r1==ejercicioActual.u && r2==ejercicioActual.du)

if(correcto){

document.getElementById("resultado").innerHTML="<span class='correcto'>Muy bien</span>"

puntuacion++
document.getElementById("score").innerText=puntuacion

setTimeout(()=>{
generarEjercicio()
document.getElementById("resultado").innerHTML=""
},1200)

}else{

document.getElementById("resultado").innerHTML="<span class='incorrecto'>Intenta otra vez</span>"

}

}

generarEjercicio()

</script>

</body>
</html>
