<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reto de Integrales Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 700px; }
        
        .display-integral { 
            font-size: 3.5rem; 
            margin: 30px 0; 
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controles { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        
        .btn-opcion { 
            padding: 12px 20px; 
            background: #fff; 
            border: 2px solid #1a73e8; 
            color: #1a73e8;
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .btn-opcion:hover { background: #e8f0fe; }
        
        .btn-reset { background: #f1f3f4; border: 1px solid #ccc; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        .puntos { font-size: 1.5rem; font-weight: bold; color: #1a73e8; margin-bottom: 15px; }
        .msg { margin-top: 20px; font-weight: bold; font-size: 1.2rem; height: 30px; }
        
        .instrucciones { color: #5f6368; margin-bottom: 20px; }
        .verificar-btn { background: #1a73e8; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="puntos">Puntuación: <span id="score">0</span></div>

    <div class="card">
        <h2>Completa la Integral</h2>
        <p class="instrucciones">Haz clic en los botones para rellenar los espacios $[\dots]$ en orden.</p>
        
        <div class="display-integral" id="math-box">
            </div>

        <div class="controles" id="botones-opciones"></div>
        
        <button class="btn-reset" onclick="resetIntegral()">Borrar espacios</button>
        <br>
        <button class="verificar-btn" onclick="verificar()">Comprobar Resultado</button>
        
        <div id="msg" class="msg"></div>
    </div>

    <script>
        let score = 0;
        let actual = {};
        let respuestas = []; // Guardará lo que el usuario elige

        const EJERCICIOS = [
            {
                template: (r) => `\\int ${r[0] || '[\\dots]'} \\cdot e^{${r[1] || '[\\dots]'}} \\, dx`,
                u: '3x', du: '3', ops: ['3', '3x', 'x', 'e^x']
            },
            {
                template: (r) => `\\int ${r[0] || '[\\dots]'} \\cdot \\sqrt{${r[1] || '[\\dots]'}} \\, dx`,
                u: 'x^2', du: '2x', ops: ['2x', 'x^2', 'x', '2']
            },
            {
                template: (r) => `\\int \\frac{${r[0] || '[\\dots]'}}{${r[1] || '[\\dots]'}} \\, dx`,
                u: 'x^3', du: '3x^2', ops: ['3x^2', 'x^3', 'x^2', '3']
            },
            {
                template: (r) => `\\int ${r[0] || '[\\dots]'} \\cdot \\cos(${r[1] || '[\\dots]'}) \\, dx`,
                u: '5x', du: '5', ops: ['5', '5x', 'x', '\\sin x']
            }
        ];

        function nuevaIntegral() {
            actual = EJERCICIOS[Math.floor(Math.random() * EJERCICIOS.length)];
            respuestas = [];
            render();
            
            // Mezclar opciones y crear botones
            const botones = [...actual.ops].sort(() => Math.random() - 0.5);
            document.getElementById('botones-opciones').innerHTML = botones.map(opt => 
                `<button class="btn-opcion" onclick="elegir('${opt}')">\\(${opt}\\)</button>`
            ).join('');
            
            MathJax.typesetPromise();
        }

        function elegir(valor) {
            if (respuestas.length < 2) {
                respuestas.push(valor);
                render();
            }
        }

        function resetIntegral() {
            respuestas = [];
            render();
        }

        function render() {
            const box = document.getElementById('math-box');
            // Generamos el string de LaTeX puro usando la plantilla y las respuestas
            const tex = actual.template(respuestas);
            box.innerHTML = `\\[ ${tex} \\]`;
            MathJax.typesetPromise([box]);
        }

        function verificar() {
            const m = document.getElementById('msg');
            if (respuestas.length < 2) {
                m.innerHTML = "<span style='color:orange'>Rellena ambos espacios primero.</span>";
                return;
            }

            // En la mayoría de mis plantillas: r[0] es du y r[1] es u
            // Excepto en la fracción donde r[0] es du (arriba) y r[1] es u (abajo)
            if (respuestas[0] === actual.du && respuestas[1] === actual.u) {
                m.innerHTML = "<span style='color:green'>¡Correcto! +1 punto</span>";
                score++;
                document.getElementById('score').innerText = score;
                setTimeout(() => { m.innerText = ""; nuevaIntegral(); }, 1500);
            } else {
                m.innerHTML = "<span style='color:red'>Incorrecto. Revisa el cambio de variable.</span>";
            }
        }

        window.onload = nuevaIntegral;
    </script>
</body>
</html>
