<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Integrales Pro</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']] },
            options: {
                enableExplorer: true,
                renderActions: {
                    addEvents: [200, (doc) => {
                        // Esta función hace que las clases de LaTeX sean interactivas
                        document.querySelectorAll('.dropzone').forEach(el => {
                            el.addEventListener('dragover', e => e.preventDefault());
                            el.addEventListener('drop', handleDrop);
                        });
                    }, '']
                }
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; min-width: 500px; }
        
        /* Estilo de los huecos dentro de la fórmula */
        .dropzone {
            display: inline-block;
            min-width: 60px;
            min-height: 40px;
            border: 2px dashed #1a73e8 !important;
            background: #e8f0fe;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
            vertical-align: middle;
            color: #1a73e8;
            padding: 2px 8px;
        }
        .dropzone:hover { background: #d2e3fc; }

        .opciones { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .opcion { padding: 12px 20px; background: white; border: 2px solid #1a73e8; border-radius: 10px; cursor: grab; font-size: 1.3rem; }
        
        #score { font-size: 1.5rem; font-weight: bold; color: #1a73e8; margin-bottom: 20px; }
        button { margin-top: 30px; padding: 12px 25px; background: #1a73e8; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 1rem; }
        #msg { margin-top: 15px; font-weight: bold; height: 25px; }
    </style>
</head>
<body>

    <div id="score">Puntuación: <span>0</span></div>

    <div class="card">
        <h2>Completa la integral correctamente</h2>
        <div id="math-area" style="font-size: 3rem; margin: 40px 0;">
            </div>
        <div class="opciones" id="opciones-box"></div>
        <button onclick="check()">Verificar Resultado</button>
        <div id="msg"></div>
    </div>

    <script>
        let puntos = 0;
        let estado = { u: '', du: '', rU: '', rDU: '' };

        function generar() {
            const n = Math.floor(Math.random() * 3) + 2;
            const tipos = [
                { // División (u en el denominador)
                    u: `x^{${n}}`, du: `${n}x^{${n-1}}`,
                    tex: `\\int \\frac{\\class{dropzone}{?_{du}}}{\\class{dropzone}{?_{u}}} \\, dx`
                },
                { // Raíz cuadrada
                    u: `x^2+1`, du: `2x`,
                    tex: `\\int \\class{dropzone}{?_{du}} \\cdot \\sqrt{\\class{dropzone}{?_{u}}} \\, dx`
                },
                { // Exponencial
                    u: `${n}x`, du: `${n}`,
                    tex: `\\int \\class{dropzone}{?_{du}} \\cdot e^{\\class{dropzone}{?_{u}}} \\, dx`
                },
                { // Logaritmo
                    u: `\\ln x`, du: `\\frac{1}{x}`,
                    tex: `\\int \\class{dropzone}{?_{u}} \\cdot \\class{dropzone}{?_{du}} \\, dx`
                }
            ];

            const sel = tipos[Math.floor(Math.random() * tipos.length)];
            estado = { u: sel.u, du: sel.du, rU: '', rDU: '' };

            document.getElementById('math-area').innerHTML = `$$${sel.tex}$$`;
            
            // Opciones
            const ops = [sel.u, sel.du, 'x', '7'].sort(() => Math.random() - 0.5);
            document.getElementById('opciones-box').innerHTML = ops.map(o => 
                `<div class="opcion" draggable="true" ondragstart="drag(event)" data-val="${o}">$${o}$</div>`
            ).join('');

            MathJax.typesetPromise();
        }

        function drag(e) { e.dataTransfer.setData("text", e.target.dataset.val); }

        function handleDrop(e) {
            e.preventDefault();
            const val = e.dataTransfer.getData("text");
            const target = e.target.closest('.dropzone');
            
            // Guardamos la respuesta según qué hueco sea
            if (target.innerText.includes('u') && !target.innerText.includes('du')) {
                estado.rU = val;
            } else {
                estado.rDU = val;
            }

            target.innerHTML = val;
            target.style.borderStyle = "solid";
            MathJax.typesetPromise();
        }

        function check() {
            const m = document.getElementById('msg');
            if (estado.rU === estado.u && estado.rDU === estado.du) {
                puntos++;
                document.querySelector('#score span').innerText = puntos;
                m.innerHTML = "<span style='color:green'>¡Excelente razonamiento!</span>";
                setTimeout(() => { m.innerText = ""; generar(); }, 1500);
            } else {
                m.innerHTML = "<span style='color:red'>Revisa la posición de u y su derivada du.</span>";
            }
        }

        window.onload = generar;
    </script>
</body>
</html>
