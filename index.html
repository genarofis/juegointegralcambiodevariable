<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desafío Integral: 10 Niveles</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 850px; }
        .stats { display: flex; gap: 40px; margin-bottom: 15px; font-size: 1.3rem; font-weight: bold; color: #34495e; }
        #lvl { color: #d35400; } #pts { color: #2980b9; }
        .integral-box { font-size: 3rem; margin: 25px 0; padding: 30px; background: #fff; border: 2px solid #dee2e6; border-radius: 15px; min-height: 140px; display: flex; justify-content: center; align-items: center; }
        .controles { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-op { padding: 12px 20px; background: white; border: 2px solid #2980b9; color: #2980b9; border-radius: 10px; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn-op:hover { background: #2980b9; color: white; }
        .btn-check { background: #27ae60; color: white; border: none; padding: 15px 50px; border-radius: 40px; font-size: 1.3rem; cursor: pointer; margin-top: 30px; font-weight: bold; }
        .feedback { margin-top: 20px; font-weight: bold; font-size: 1.2rem; min-height: 30px; }
    </style>
</head>
<body>
    <div class="stats">
        <div>Puntos: <span id="pts">0</span></div>
        <div>Nivel: <span id="lvl">1/10</span></div>
    </div>
    <div class="card">
        <div class="integral-box" id="math-box"></div>
        <div class="controles" id="botones"></div>
        <button class="btn-check" onclick="validar()">Verificar</button>
        <div id="feedback" class="feedback"></div>
    </div>

<script>
let score = 0;
let elegidos = [];
let ejercicioActual = null;
let historial = [];

// Base de datos de 50 ejercicios categorizados en 10 niveles (5 ejercicios por nivel)
const BANCO = [
    // Niveles 1-2: Básicos (Potencias y trig simple)
    { t:(r)=>`\\int (${r[0]||'?'})^3 \\cdot ${r[1]||'?'} \\, dx`, u:'x^2', du:'2x', ops:['x^2','2x','x','2'], l:1 },
    { t:(r)=>`\\int \\sin(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'x^4', du:'4x^3', ops:['x^4','4x^3','x^3','4'], l:1 },
    { t:(r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'5x', du:'5', ops:['5x','5','x','e'], l:1 },
    { t:(r)=>`\\int \\cos(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'x^2', du:'2x', ops:['x^2','2x','x','2'], l:1 },
    { t:(r)=>`\\int (${r[0]||'?'})^4 \\cdot ${r[1]||'?'} \\, dx`, u:'x^3', du:'3x^2', ops:['x^3','3x^2','x^2','3'], l:1 },
    { t:(r)=>`\\int (${r[0]||'?'})^5 \\cdot ${r[1]||'?'} \\, dx`, u:'2x', du:'2', ops:['2x','2','x','5'], l:2 },
    { t:(r)=>`\\int \\sin(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'3x', du:'3', ops:['3x','3','x','\\cos x'], l:2 },
    { t:(r)=>`\\int \\cos(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'4x', du:'4', ops:['4x','4','x','\\sin x'], l:2 },
    { t:(r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2+1', du:'2x', ops:['x^2+1','2x','x','1'], l:2 },
    { t:(r)=>`\\int (${r[0]||'?'})^2 \\cdot ${r[1]||'?'} \\, dx`, u:'x^4', du:'4x^3', ops:['x^4','4x^3','x^3','4'], l:2 },
    // Niveles 3-4: Logaritmos y Raíces
    { t:(r)=>`\\int (${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'\\ln x', du:'\\frac{1}{x}', ops:['\\ln x','\\frac{1}{x}','x','e'], l:3 },
    { t:(r)=>`\\int \\sqrt{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2', du:'2x', ops:['x^2','2x','x','2'], l:3 },
    { t:(r)=>`\\int \\frac{1}{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'\\cos x', du:'-\\sin x', ops:['\\cos x','-\\sin x','x','x'], l:3 },
    { t:(r)=>`\\int \\sqrt[3]{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^3+1', du:'3x^2', ops:['x^3+1','3x^2','x^2','3'], l:3 },
    { t:(r)=>`\\int (${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'\\ln(x^2)', du:'\\frac{2}{x}', ops:['\\ln(x^2)','\\frac{2}{x}','x','2'], l:3 },
    { t:(r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'\\sin x', du:'\\cos x', ops:['\\sin x','\\cos x','x','1'], l:4 },
    { t:(r)=>`\\int (${r[0]||'?'})^{-2} \\cdot ${r[1]||'?'} \\, dx`, u:'x^4', du:'4x^3', ops:['x^4','4x^3','x^3','4'], l:4 },
    { t:(r)=>`\\int \\frac{1}{\\sqrt{${r[0]||'?'}}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2', du:'2x', ops:['x^2','2x','x','1/2'], l:4 },
    { t:(r)=>`\\int (${r[0]||'?'})^{0.5} \\cdot ${r[1]||'?'} \\, dx`, u:'x^3+1', du:'3x^2', ops:['x^3+1','3x^2','x^2','3'], l:4 },
    { t:(r)=>`\\int \\frac{1}{x \\cdot \\ln x} \\cdot ${r[1]||'?'} \\, dx`, u:'\\ln x', du:'\\frac{1}{x}', ops:['\\ln x','\\frac{1}{x}','x','e'], l:4 },
    // Niveles 5-7: Trig y Potencias complejas
    { t:(r)=>`\\int (${r[0]||'?'})^{-3} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2+1', du:'2x', ops:['x^2+1','2x','x','-3'], l:5 },
    { t:(r)=>`\\int \\sec^2(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'x^3', du:'3x^2', ops:['x^3','3x^2','x^2','3'], l:5 },
    { t:(r)=>`\\int \\cos(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'\\ln x', du:'\\frac{1}{x}', ops:['\\ln x','\\frac{1}{x}','x','1'], l:5 },
    { t:(r)=>`\\int (${r[0]||'?'})^{1/4} \\cdot ${r[1]||'?'} \\, dx`, u:'x^4+1', du:'4x^3', ops:['x^4+1','4x^3','x^3','4'], l:5 },
    { t:(r)=>`\\int (${r[0]||'?'})^{-4} \\cdot ${r[1]||'?'} \\, dx`, u:'3x', du:'3', ops:['3x','3','x','-4'], l:5 },
    { t:(r)=>`\\int (${r[0]||'?'})^{2/3} \\cdot ${r[1]||'?'} \\, dx`, u:'x+5', du:'1', ops:['x+5','1','x','2/3'], l:6 },
    { t:(r)=>`\\int \\sin(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'e^x', du:'e^x', ops:['e^x','e^x','x','1'], l:6 },
    { t:(r)=>`\\int \\frac{1}{\\cos^2(${r[0]||'?'})} \\cdot ${r[1]||'?'} \\, dx`, u:'x^4', du:'4x^3', ops:['x^4','4x^3','x^3','4'], l:6 },
    { t:(r)=>`\\int (${r[0]||'?'})^{-1/2} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2+x', du:'2x+1', ops:['x^2+x','2x+1','x','1'], l:6 },
    { t:(r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'-x^2', du:'-2x', ops:['-x^2','-2x','x','2'], l:6 },
    { t:(r)=>`\\int \\cos^2(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'\\sin x', du:'\\cos x', ops:['\\sin x','\\cos x','x','1'], l:7 },
    { t:(r)=>`\\int \\frac{1}{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'e^x', du:'e^x', ops:['e^x','e^x','x','1'], l:7 },
    { t:(r)=>`\\int (${r[0]||'?'})^{3/2} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2-1', du:'2x', ops:['x^2-1','2x','x','2'], l:7 },
    { t:(r)=>`\\int \\sec(${r[0]||'?'})\\tan(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'x^2', du:'2x', ops:['x^2','2x','x','2'], l:7 },
    { t:(r)=>`\\int \\frac{1}{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'\\tan x', du:'\\sec^2 x', ops:['\\tan x','\\sec^2 x','\\cos x','x'], l:7 },
    // Niveles 8-10: Expertos
    { t:(r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'\\sqrt{x}', du:'\\frac{1}{2\\sqrt{x}}', ops:['\\sqrt{x}','\\frac{1}{2\\sqrt{x}}','x','2'], l:8 },
    { t:(r)=>`\\int (${r[0]||'?'})^{-5} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2+x', du:'2x+1', ops:['x^2+x','2x+1','x','1'], l:8 },
    { t:(r)=>`\\int \\sin^2(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'\\cos x', du:'-\\sin x', ops:['\\cos x','-\\sin x','\\sin x','x'], l:8 },
    { t:(r)=>`\\int \\sqrt[5]{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^3', du:'3x^2', ops:['x^3','3x^2','x^2','3'], l:8 },
    { t:(r)=>`\\int (${r[0]||'?'})^6 \\cdot ${r[1]||'?'} \\, dx`, u:'x^3-4', du:'3x^2', ops:['x^3-4','3x^2','x^2','3'], l:8 },
    { t:(r)=>`\\int \\ln(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'e^x', du:'e^x', ops:['e^x','e^x','x','1'], l:9 },
    { t:(r)=>`\\int (${r[0]||'?'})^7 \\cdot ${r[1]||'?'} \\, dx`, u:'\\sin x', du:'\\cos x', ops:['\\sin x','\\cos x','x','1'], l:9 },
    { t:(r)=>`\\int \\frac{1}{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2+2x', du:'2x+2', ops:['x^2+2x','2x+2','x','2'], l:9 },
    { t:(r)=>`\\int (${r[0]||'?'})^{-1/3} \\cdot ${r[1]||'?'} \\, dx`, u:'x^3+1', du:'3x^2', ops:['x^3+1','3x^2','x^2','3'], l:9 },
    { t:(r)=>`\\int \\sin(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'x^2-x', du:'2x-1', ops:['x^2-x','2x-1','x','1'], l:9 },
    { t:(r)=>`\\int (${r[0]||'?'})^8 \\cdot ${r[1]||'?'} \\, dx`, u:'\\sqrt{x}', du:'\\frac{1}{2\\sqrt{x}}', ops:['\\sqrt{x}','\\frac{1}{2\\sqrt{x}}','x','2'], l:10 },
    { t:(r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^3+x', du:'3x^2+1', ops:['x^3+x','3x^2+1','x','1'], l:10 },
    { t:(r)=>`\\int \\cos(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'\\ln x', du:'\\frac{1}{x}', ops:['\\ln x','\\frac{1}{x}','x','1'], l:10 },
    { t:(r)=>`\\int (${r[0]||'?'})^{-6} \\cdot ${r[1]||'?'} \\, dx`, u:'x^4+x', du:'4x^3+1', ops:['x^4+x','4x^3+1','x','1'], l:10 },
    { t:(r)=>`\\int \\sin(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'e^{2x}', du:'2e^{2x}', ops:['e^{2x}','2e^{2x}','x','2'], l:10 }
];

function cargar() {
    let nActual = Math.min(Math.floor(score / 5) + 1, 10);
    document.getElementById('lvl').innerText = nActual + "/10";
    
    let pool = BANCO.filter(e => e.l <= nActual && !historial.includes(e));
    if(pool.length === 0) { historial = []; pool = BANCO.filter(e => e.l <= nActual); }
    
    ejercicioActual = pool[Math.floor(Math.random() * pool.length)];
    historial.push(ejercicioActual);
    elegidos = [];
    
    render();
    const ops = [...ejercicioActual.ops].sort(()=>Math.random()-0.5);
    document.getElementById('botones').innerHTML = ops.map(o => `<button class="btn-op" onclick="seleccionar('${o}')">\\(${o}\\)</button>`).join('');
    MathJax.typesetPromise();
}

function seleccionar(v) { if(elegidos.length < 2) { elegidos.push(v); render(); } }

function render() {
    const box = document.getElementById('math-box');
    box.innerHTML = `\\[ ${ejercicioActual.t(elegidos)} \\]`;
    MathJax.typesetPromise([box]);
}

function validar() {
    const fb = document.getElementById('feedback');
    if (elegidos[0] === ejercicioActual.u && elegidos[1] === ejercicioActual.du) {
        fb.innerHTML = "<span style='color:green'>¡Correcto!</span>";
        score++; document.getElementById('pts').innerText = score;
        setTimeout(() => { fb.innerText = ""; cargar(); }, 1200);
    } else {
        fb.innerHTML = "<span style='color:red'>Incorrecto. Orden: u, luego du.</span>";
        elegidos = []; render();
    }
}
window.onload = cargar;
</script>
</body>
</html>
