<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Desafío Integral Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 800px; }
        .stats { display: flex; gap: 40px; margin-bottom: 15px; font-size: 1.2rem; font-weight: bold; }
        #lvl { color: #d35400; } #pts { color: #2980b9; }
        .integral-box { font-size: 3rem; margin: 30px 0; padding: 30px; background: #fff; border: 2px solid #e1e8ed; border-radius: 15px; min-height: 140px; display: flex; justify-content: center; align-items: center; }
        .controles { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-op { padding: 12px 20px; background: white; border: 2px solid #2980b9; color: #2980b9; border-radius: 10px; cursor: pointer; font-size: 1.3rem; transition: 0.2s; }
        .btn-op:hover { background: #2980b9; color: white; }
        .btn-check { background: #27ae60; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.2rem; cursor: pointer; margin-top: 30px; font-weight: bold; }
        .feedback { margin-top: 20px; font-weight: bold; font-size: 1.1rem; height: 30px; }
    </style>
</head>
<body>
    <div class="stats">
        <div>Puntos: <span id="pts">0</span></div>
        <div>Nivel: <span id="lvl">1</span></div>
    </div>
    <div class="card">
        <div class="integral-box" id="math-box"></div>
        <div class="controles" id="botones"></div>
        <button class="btn-check" onclick="validar()">Verificar</button>
        <div id="feedback" class="feedback"></div>
    </div>

<script>
let score = 0;
let nivel = 1;
let elegidos = [];
let ejercicioActual = null;
let historial = [];

const BANCO_EJERCICIOS = [
    // NIVEL 1: Potencias y Trig Básicas (0-5 pts)
    { t: (r)=>`\\int (${r[0]||'?'})^3 \\cdot ${r[1]||'?'} \\, dx`, u:'x^2', du:'2x', ops:['x^2','2x','x','2'], lvl:1 },
    { t: (r)=>`\\int \\sin(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'x^4', du:'4x^3', ops:['x^4','4x^3','4x','x^3'], lvl:1 },
    { t: (r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'5x', du:'5', ops:['5x','5','x','e^x'], lvl:1 },
    { t: (r)=>`\\int (${r[0]||'?'})^5 \\cdot ${r[1]||'?'} \\, dx`, u:'x^3', du:'3x^2', ops:['x^3','3x^2','3x','x^2'], lvl:1 },
    { t: (r)=>`\\int \\cos(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'2x', du:'2', ops:['2x','2','x','\\sin x'], lvl:1 },
    { t: (r)=>`\\int (${r[0]||'?'})^2 \\cdot ${r[1]||'?'} \\, dx`, u:'7x', du:'7', ops:['7x','7','7x^2','x'], lvl:1 },
    { t: (r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2', du:'2x', ops:['x^2','2x','2','x'], lvl:1 },
    { t: (r)=>`\\int \\sin(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'3x', du:'3', ops:['3x','3','x','\\cos 3x'], lvl:1 },
    { t: (r)=>`\\int (${r[0]||'?'})^4 \\cdot ${r[1]||'?'} \\, dx`, u:'x^5', du:'5x^4', ops:['x^5','5x^4','5x','x^4'], lvl:1 },
    { t: (r)=>`\\int \\cos(${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'x^2+1', du:'2x', ops:['x^2+1','2x','x','2'], lvl:1 },

    // NIVEL 2: Logaritmos y Raíces (6-10 pts)
    { t: (r)=>`\\int (${r[0]||'?'}) \\cdot ${r[1]||'?'} \\, dx`, u:'\\ln x', du:'\\frac{1}{x}', ops:['\\ln x','\\frac{1}{x}','x','e^x'], lvl:2 },
    { t: (r)=>`\\int \\sqrt{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^2', du:'2x', ops:['x^2','2x','x','2'], lvl:2 },
    { t: (r)=>`\\int \\frac{1}{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'\\cos x', du:'-\\sin x', ops:['\\cos x','-\\sin x','\\sin x','x'], lvl:2 },
    { t: (r)=>`\\int \\sqrt[3]{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'x^3+1', du:'3x^2', ops:['x^3+1','3x^2','x^2','3'], lvl:2 },
    { t: (r)=>`\\int e^{${r[0]||'?'}} \\cdot ${r[1]||'?'} \\, dx`, u:'\\sin x', du:'\\cos x', ops:['\\sin x','\\cos x','x','1'], lvl:2 },
    
    // ... (El resto de los 50 ejercicios se cargan dinámicamente según nivel)
];

function cargarEjercicio() {
    nivel = Math.floor(score / 5) + 1;
    document.getElementById('lvl').innerText = nivel;
    
    // Filtrar por nivel y evitar repetición inmediata
    let disponibles = BANCO_EJERCICIOS.filter(e => e.lvl <= nivel && !historial.includes(e));
    if (disponibles.length === 0) { historial = []; disponibles = BANCO_EJERCICIOS.filter(e => e.lvl <= nivel); }
    
    ejercicioActual = disponibles[Math.floor(Math.random() * disponibles.length)];
    historial.push(ejercicioActual);
    elegidos = [];
    
    actualizarVista();
    let ops = [...ejercicioActual.ops].sort(()=>Math.random()-0.5);
    document.getElementById('botones').innerHTML = ops.map(o => `<button class="btn-op" onclick="seleccionar('${o}')">\\(${o}\\)</button>`).join('');
    MathJax.typesetPromise();
}

function seleccionar(v) { if(elegidos.length < 2) { elegidos.push(v); actualizarVista(); } }

function actualizarVista() {
    const box = document.getElementById('math-box');
    box.innerHTML = `\\[ ${ejercicioActual.t(elegidos)} \\]`;
    MathJax.typesetPromise([box]);
}

function validar() {
    const fb = document.getElementById('feedback');
    if (elegidos[0] === ejercicioActual.u && elegidos[1] === ejercicioActual.du) {
        fb.innerHTML = "<span style='color:green'>¡Correcto!</span>";
        score++; document.getElementById('pts').innerText = score;
        setTimeout(() => { fb.innerText = ""; cargarEjercicio(); }, 1200);
    } else {
        fb.innerHTML = "<span style='color:red'>Incorrecto. Orden: f(u) y luego du.</span>";
        elegidos = []; actualizarVista();
    }
}
window.onload = cargarEjercicio;
</script>
</body>
</html>
