<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DesafûÙo Integral 50</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 850px; }
        .integral-area { font-size: 2.2rem; margin: 20px 0; text-align: center; color: #2c3e50; }
        .controles { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .btn-op { padding: 12px 18px; border: 2px solid #3498db; background: white; color: #3498db; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .btn-act { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        #btn-check { background: #27ae60; padding: 15px 40px; font-size: 1.2rem; margin-top: 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="progreso" style="color:#7f8c8d; font-weight:bold;">Ejercicio 1/50</div>
    <div class="integral-area" id="math-box"></div>
    <div id="opciones-container" class="controles"></div>
    <div class="controles" style="margin-top: 20px;">
        <button class="btn-act" style="background:#e67e22" onclick="revertir()">Borrar û¤ltima</button>
        <button class="btn-act" style="background:#95a5a6" onclick="saltar()">Saltar Ejercicio</button>
    </div>
    <div style="text-align:center;">
        <button id="btn-check" class="btn-act" onclick="validar()">Verificar</button>
    </div>
    <div id="feedback" style="margin-top:15px; font-weight:bold; text-align:center;"></div>
</div>

<script>
let score = 0; let index = 0; let fallos = 0; let elegidos = []; let actual = {};
const BANCO = [
    // Polinomios 3 tûˋrminos
    { u: "x^3+x^2+x", du: "3x^2+2x+1", ops: ["x^3+x^2+x", "3x^2+2x+1", "x^2+x", "2x+1"] },
    { u: "x^3+5x+2", du: "3x^2+5", ops: ["x^3+5x+2", "3x^2+5", "3x^2", "5"] },
    // Trigonomûˋtricas
    { u: "\\sin(x^2)", du: "2x\\cos(x^2)", ops: ["\\sin(x^2)", "2x\\cos(x^2)", "x^2", "2x"] },
    { u: "\\cos(x^3+x)", du: "-(3x^2+1)\\sin(x^3+x)", ops: ["\\cos(x^3+x)", "-(3x^2+1)\\sin(x^3+x)", "x^3+x", "3x^2+1"] },
    // Exponenciales
    { u: "e^{x^2+x}", du: "(2x+1)e^{x^2+x}", ops: ["e^{x^2+x}", "(2x+1)e^{x^2+x}", "x^2+x", "2x+1"] },
    // Potencias fraccionarias/negativas
    { u: "(x^2+4)^{1/2}", du: "x(x^2+4)^{-1/2}", ops: ["(x^2+4)^{1/2}", "x(x^2+4)^{-1/2}", "x^2+4", "2x"] },
    { u: "(x^3+1)^{-1}", du: "-3x^2(x^3+1)^{-2}", ops: ["(x^3+1)^{-1}", "-3x^2(x^3+1)^{-2}", "x^3+1", "3x^2"] }
];

function cargar() {
    // Generamos una variedad usando mû°dulo sobre el banco
    let base = BANCO[index % BANCO.length];
    actual = { u: base.u, du: base.du, ops: base.ops };
    elegidos = []; fallos = 0;
    document.getElementById('progreso').innerText = `Ejercicio ${index + 1}/50 | Puntos: ${score}`;
    render();
}

function render() {
    const box = document.getElementById('math-box');
    const u = elegidos[0] ? `(${elegidos[0]})` : "\\square";
    const du = elegidos[1] ? `(${elegidos[1]})` : "\\square";
    box.innerHTML = `\\[ \\int ${du} \\cdot ${u}^{n} dx \\]`;
    
    const cont = document.getElementById('opciones-container');
    cont.innerHTML = "";
    [...actual.ops].sort(() => Math.random() - 0.5).forEach(op => {
        const btn = document.createElement('button');
        btn.className = 'btn-op';
        btn.innerHTML = `\\(${op}\\)`;
        btn.onclick = () => { if(elegidos.length < 2) { elegidos.push(op); render(); } };
        cont.appendChild(btn);
    });
    MathJax.typesetPromise();
}

function revertir() { elegidos.pop(); render(); }
function saltar() { index++; cargar(); }

function validar() {
    if(elegidos[0] === actual.u && elegidos[1] === actual.du) {
        document.getElementById('feedback').innerText = "ã ôÀCorrecto!";
        score++; index++; setTimeout(cargar, 1000);
    } else {
        fallos++;
        document.getElementById('feedback').innerText = `ã Error (${fallos}/2)`;
        if(fallos >= 2) { index++; cargar(); }
        else { elegidos = []; render(); }
    }
}
window.onload = cargar;
</script>
</body>
</html>
