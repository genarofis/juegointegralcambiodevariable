<h1>Juego de Cambio de Variable</h1>

<div class="score">
Puntuación: <span id="score">0</span>
</div>

<div id="ejercicio"></div>

<button onclick="verificar()">Verificar</button>

<div id="resultado"></div>

<script>

let puntuacion=0
let ejercicioActual=null

function aleatorio(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function generarEjercicio(){

let tipo=aleatorio(1,5)

let u,du,latex

switch(tipo){

case 1:

let n=aleatorio(2,4)
let p=aleatorio(2,3)

u=`x^{${n}}`
du=`${n}x^{${n-1}}`

latex=`\\int (\\boxed{\\phantom{aaa}})^{${p}}\\cdot \\boxed{\\phantom{aaa}} dx`

break

case 2:

let a=aleatorio(2,4)

u=`${a}x`
du=`${a}`

latex=`\\int \\boxed{\\phantom{aaa}}\\cdot e^{\\boxed{\\phantom{aaa}}} dx`

break

case 3:

let b=aleatorio(2,4)

u=`${b}x`
du=`${b}`

latex=`\\int \\boxed{\\phantom{aaa}}\\cdot \\sin(\\boxed{\\phantom{aaa}}) dx`

break

case 4:

let c=aleatorio(2,4)

u=`${c}x`
du=`${c}`

latex=`\\int \\boxed{\\phantom{aaa}}\\cdot \\cos(\\boxed{\\phantom{aaa}}) dx`

break

case 5:

u=`\\ln x`
du=`\\frac{1}{x}`

latex=`\\int \\frac{\\boxed{\\phantom{aaa}}}{\\boxed{\\phantom{aaa}}} dx`

break

}

let distractores=[
"x^2","2x","x^3","3x^2","5","5x",
"\\sin x","\\cos x","e^x","\\ln x"
]

distractores=distractores.filter(d=>d!=u && d!=du)

let d1=distractores[aleatorio(0,distractores.length-1)]
let d2=distractores[aleatorio(0,distractores.length-1)]

let opciones=[u,du,d1,d2]

opciones.sort(()=>Math.random()-0.5)

ejercicioActual={u,du,latex,opciones,respuestas:{}}

dibujar()

}

function dibujar(){

let html=""

html+=`<div class="integral">\\[${ejercicioActual.latex}\\]</div>`

html+=`<div id="drops"></div>`

html+=`<div class="opciones">`

ejercicioActual.opciones.forEach(op=>{

html+=`<div class="opcion"
draggable="true"
ondragstart="drag(event)"
data-value="${op}">
\\(${op}\\)
</div>`

})

html+=`</div>`

document.getElementById("ejercicio").innerHTML=html

MathJax.typesetPromise().then(()=>{

let boxes=document.querySelectorAll("mjx-box")

})

}

function drag(ev){

ev.dataTransfer.setData("text",ev.target.dataset.value)

}

function allowDrop(ev){
ev.preventDefault()
}

function drop(ev){

ev.preventDefault()

let data=ev.dataTransfer.getData("text")

ev.target.innerHTML="\\("+data+"\\)"

ev.target.dataset.value=data

MathJax.typesetPromise([ev.target])

}

function verificar(){

let drops=document.querySelectorAll(".dropzone")

if(drops.length<2)return

let r1=drops[0].dataset.value
let r2=drops[1].dataset.value

let correcto=(r1==ejercicioActual.u && r2==ejercicioActual.du)

if(correcto){

document.getElementById("resultado").innerHTML="<span class='correcto'>Muy bien</span>"

puntuacion++
document.getElementById("score").innerText=puntuacion

setTimeout(()=>{
generarEjercicio()
document.getElementById("resultado").innerHTML=""
},1200)

}else{

document.getElementById("resultado").innerHTML="<span class='incorrecto'>Intenta otra vez</span>"

}

}

generarEjercicio()

</script>
