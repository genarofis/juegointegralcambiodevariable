<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reto Integral: 50 Niveles</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 900px; }
        .integral-area { font-size: 3rem; margin: 30px 0; min-height: 120px; display: flex; justify-content: center; align-items: center; }
        .controles { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-opcion { padding: 12px 20px; background: white; border: 2px solid #2980b9; color: #2980b9; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        .btn-opcion:hover { background: #2980b9; color: white; }
        .btn-action { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 8px; font-size: 1rem; }
        .btn-clear { background: #95a5a6; color: white; }
        .btn-skip { background: #e67e22; color: white; }
        .btn-check { background: #27ae60; color: white; padding: 15px 50px; border-radius: 40px; font-size: 1.3rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="progreso">Nivel 1/50</div>
    <div class="integral-area" id="math-box"></div>
    <div id="botones-opciones" class="controles"></div>
    <div class="controles">
        <button class="btn-action btn-clear" onclick="limpiar()">Borrar Selección</button>
        <button class="btn-action btn-skip" onclick="saltar()">Saltar Ejercicio</button>
    </div>
    <button class="btn-check" onclick="validar()">Comprobar</button>
    <div id="feedback"></div>
</div>

<script>
let score = 0;
let elegidos = [];
let actual = {};

// Los 50 ejercicios estructurados
const EJERCICIOS = [
    { t:(r)=>`\\int (${r[0]||'\\square'})^3 \\cdot ${r[1]||'\\square'} \\, dx`, u:'5x', du:'5', ops:['5x','5','x^3','3x^2'] },
    { t:(r)=>`\\int e^{${r[0]||'\\square'}} \\cdot ${r[1]||'\\square'} \\, dx`, u:'2x', du:'2', ops:['2x','2','e^x','e^{2x}'] },
    { t:(r)=>`\\int \\sin(${r[0]||'\\square'}) \\cdot ${r[1]||'\\square'} \\, dx`, u:'3x', du:'3', ops:['3x','3','\\sin x','\\cos x'] },
    // ... [Repetir patrón para los 50 ejercicios aquí]
    { t:(r)=>`\\int (${r[0]||'\\square'})^6 \\cdot ${r[1]||'\\square'} \\, dx`, u:'x^3-4', du:'3x^2', ops:['x^3-4','3x^2','x^2','3'] }
];

function cargar() {
    actual = EJERCICIOS[score % EJERCICIOS.length];
    elegidos = [];
    document.getElementById('progreso').innerText = `Ejercicio ${score + 1}/50`;
    refrescar();
}

function refrescar() {
    const box = document.getElementById('math-box');
    box.innerHTML = `\\[ ${actual.t(elegidos)} \\]`;
    const cont = document.getElementById('botones-opciones');
    cont.innerHTML = actual.ops.map(o => `<button class="btn-opcion" onclick="pulsar('${o}')">\\(${o}\\)</button>`).join('');
    MathJax.typesetPromise();
}

function pulsar(v) {
    if(elegidos.length < 2) { elegidos.push(v); refrescar(); }
}

function limpiar() { elegidos = []; refrescar(); }
function saltar() { score++; cargar(); }

function validar() {
    if(elegidos[0] === actual.u && elegidos[1] === actual.du) {
        document.getElementById('feedback').innerText = "¡Correcto!";
        score++; setTimeout(cargar, 1000);
    } else {
        document.getElementById('feedback').innerText = "Incorrecto. Orden: u, du.";
        limpiar();
    }
}
window.onload = cargar;
</script>
</body>
</html>
