<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reto de Integrales: Cambio de Variable</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .score-container { font-size: 1.5rem; margin-bottom: 20px; color: #333; }
        #score { color: #1a73e8; font-weight: bold; }
        
        .ejercicio-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 700px; }
        
        /* Estilo para las zonas de soltar dentro de la integral */
        .dz-inline {
            display: inline-flex;
            width: 90px;
            height: 45px;
            border: 2px dashed #1a73e8;
            border-radius: 8px;
            background: #e8f0fe;
            margin: 0 5px;
            vertical-align: middle;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .dz-inline.filled { border-style: solid; background: #fff; width: auto; min-width: 60px; padding: 0 10px; }

        .opciones-container { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .opcion { padding: 10px 20px; background: white; border: 2px solid #1a73e8; border-radius: 10px; cursor: grab; font-size: 1.2rem; color: #1a73e8; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .opcion:active { cursor: grabbing; opacity: 0.6; }

        button { margin-top: 30px; padding: 12px 30px; background: #1a73e8; color: white; border: none; border-radius: 30px; font-size: 1.1rem; cursor: pointer; }
        #resultado { margin-top: 20px; font-weight: bold; height: 30px; }
        .correcto { color: #2ecc71; }
        .incorrecto { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="score-container">Puntos: <span id="score">0</span></div>

    <div class="ejercicio-box">
        <h2 style="color: #555;">Completa la integral</h2>
        <div id="area-integral" style="font-size: 2.5rem; margin: 30px 0;"></div>
        
        <div class="opciones-container" id="opciones"></div>
        <button onclick="verificar()">Comprobar</button>
        <div id="resultado"></div>
    </div>

    <script>
        let puntuacion = 0;
        let actual = {};

        function generar() {
            const tipo = Math.floor(Math.random() * 5) + 1;
            let u, du, htmlIntegral;
            const n = Math.floor(Math.random() * 3) + 2;

            switch(tipo) {
                case 1: // Potencia: (u)^n * du
                    u = `x^{${n}}`;
                    du = `${n}x^{${n-1}}`;
                    htmlIntegral = `\\int \\left( <div id="slot1" class="dz-inline"></div> \\right)^{${n+1}} \\cdot <div id="slot2" class="dz-inline"></div> \\, dx`;
                    break;
                case 2: // Exponencial: du * e^u
                    u = `${n}x`;
                    du = `${n}`;
                    htmlIntegral = `\\int <div id="slot2" class="dz-inline"></div> \\cdot e^{<div id="slot1" class="dz-inline"></div>} \\, dx`;
                    break;
                case 3: // Logaritmo: du/u
                    u = `\\ln x`;
                    du = `\\frac{1}{x}`;
                    htmlIntegral = `\\int \\frac{<div id="slot1" class="dz-inline"></div>}{<div id="slot2" class="dz-inline"></div>} \\, dx`;
                    break;
                case 4: // Trigonométrica: du * cos(u)
                    u = `${n}x`;
                    du = `${n}`;
                    htmlIntegral = `\\int <div id="slot2" class="dz-inline"></div> \\cdot \\cos\\left( <div id="slot1" class="dz-inline"></div> \\right) \\, dx`;
                    break;
                case 5: // Raíz: du * sqrt(u)
                    u = `x^2`;
                    du = `2x`;
                    htmlIntegral = `\\int <div id="slot2" class="dz-inline"></div> \\cdot \\sqrt{<div id="slot1" class="dz-inline"></div>} \\, dx`;
                    break;
            }

            actual = { u, du, res1: null, res2: null };
            
            document.getElementById('area-integral').innerHTML = htmlIntegral;
            
            // Generar opciones (incluye distractores)
            let distractores = ['x', 'x^3', '3', 'e^x', '\\sin x'].filter(d => d !== u && d !== du);
            let opciones = [u, du, distractores[0], distractores[1]].sort(() => Math.random() - 0.5);
            
            document.getElementById('opciones').innerHTML = opciones.map(op => 
                `<div class="opcion" draggable="true" ondragstart="drag(event)" data-val="${op}">\\(${op}\\)</div>`
            ).join('');

            // Configurar zonas de soltar
            document.querySelectorAll('.dz-inline').forEach(dz => {
                dz.ondragover = e => e.preventDefault();
                dz.ondrop = drop;
            });

            MathJax.typeset();
        }

        function drag(e) { e.dataTransfer.setData("text", e.target.dataset.val); }

        function drop(e) {
            e.preventDefault();
            const val = e.dataTransfer.getData("text");
            const id = e.target.id || e.target.parentElement.id;
            const target = document.getElementById(id);
            
            target.innerHTML = `\\(${val}\\)`;
            target.classList.add('filled');
            
            if(id === 'slot1') actual.res1 = val;
            if(id === 'slot2') actual.res2 = val;
            
            MathJax.typesetPromise([target]);
        }

        function verificar() {
            if (actual.res1 === actual.u && actual.res2 === actual.du) {
                document.getElementById('resultado').innerHTML = "<span class='correcto'>¡Perfecto! +1</span>";
                puntuacion++;
                document.getElementById('score').innerText = puntuacion;
                setTimeout(() => { document.getElementById('resultado').innerHTML = ""; generar(); }, 1500);
            } else {
                document.getElementById('resultado').innerHTML = "<span class='incorrecto'>Algo no encaja, revisa la derivada.</span>";
            }
        }

        window.onload = generar;
    </script>
</body>
</html>
