<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reto de Integrales 50</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .integral-area { font-size: 2.5rem; margin: 20px 0; text-align: center; min-height: 100px; }
        .controles { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .btn-opcion { padding: 10px 15px; border: 1px solid #2980b9; background: white; color: #2980b9; cursor: pointer; border-radius: 5px; }
        .btn-action { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; color: white; }
        #btn-borrar { background: #e74c3c; } #btn-saltar { background: #f39c12; }
        .feedback { font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div id="progreso">Ejercicio 1/50</div>
    <div class="integral-area" id="math-box"></div>
    <div id="opciones-container" class="controles"></div>
    <div class="controles">
        <button id="btn-borrar" class="btn-action" onclick="revertir()">Borrar última opción</button>
        <button id="btn-saltar" class="btn-action" onclick="saltar()">Saltar ejercicio</button>
    </div>
    <div style="text-align: center;">
        <button style="padding: 15px 40px; background: #27ae60; color: white; border: none; border-radius: 20px; cursor: pointer;" onclick="validar()">Verificar</button>
    </div>
    <div id="feedback" class="feedback"></div>
</div>

<script>
let score = 0;
let index = 0;
let elegidos = [];
let actual = {};

const EJERCICIOS = [
    { u: "x^2+x+4", du: "2x+1", ops: ["x^2+x+4", "2x+1", "x^2+4", "2x"] },
    { u: "e^{3x}", du: "3e^{3x}", ops: ["e^{3x}", "3e^{3x}", "e^x", "e"] },
    { u: "\\ln(x)", du: "1/x", ops: ["\\ln(x)", "1/x", "x", "\\ln(2x)"] }
    // ... agrega tus 50 ejercicios aquí con el mismo formato
];

function cargar() {
    actual = EJERCICIOS[index % EJERCICIOS.length];
    elegidos = [];
    document.getElementById('progreso').innerText = `Ejercicio ${index + 1}/50 | Puntos: ${score}`;
    render();
}

function render() {
    // Usamos espacios en blanco seguros
    const box = document.getElementById('math-box');
    const u_val = elegidos[0] ? `(${elegidos[0]})` : "\\_\\_\\_";
    const du_val = elegidos[1] ? `(${elegidos[1]})` : "\\_\\_\\_";
    box.innerHTML = `\\[ \\int ${du_val} \\cdot (${u_val})^{-1} dx \\]`;
    
    const cont = document.getElementById('opciones-container');
    cont.innerHTML = "";
    
    // Mezcla aleatoria para evitar que siempre sean 1 y 2
    [...actual.ops].sort(() => Math.random() - 0.5).forEach(op => {
        const btn = document.createElement('button');
        btn.className = 'btn-opcion';
        btn.innerHTML = `\\(${op}\\)`;
        btn.onclick = () => { if(elegidos.length < 2) { elegidos.push(op); render(); } };
        cont.appendChild(btn);
    });
    MathJax.typesetPromise();
}

function revertir() { elegidos.pop(); render(); }
function saltar() { index++; cargar(); }

function validar() {
    if(elegidos[0] === actual.u && elegidos[1] === actual.du) {
        document.getElementById('feedback').innerText = "✅ ¡Correcto!";
        score++; index++; setTimeout(cargar, 1000);
    } else {
        document.getElementById('feedback').innerText = "❌ Incorrecto. Intenta de nuevo.";
        elegidos = []; render();
    }
}

window.onload = cargar;
</script>
</body>
</html>
